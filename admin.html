<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin — Pristine Powerwashing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

<style>
:root{
  --ink:#041628;--deep:#082844;--mid:#0f4a7a;
  --aqua:#3bc4f2;--aqua-lt:#7bd9f4;--mist:#b8e1f1;
  --foam:#eaf6fc;--paper:#fbfdfe;
  --gold:#f4b844;--gold-dk:#c8891a;--coal:#1d1305;
  --green:#34d399;--red:#f87171;--orange:#fbbf24;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Manrope',system-ui,sans-serif;color:var(--ink);background:#f0f4f8;line-height:1.6;min-height:100vh}
a{color:var(--mid);text-decoration:none}

/* ===== TOP BAR ===== */
.topbar{background:var(--ink);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar .brand{font-family:'Fraunces',serif;font-weight:900;font-size:20px;display:flex;align-items:center;gap:10px}
.topbar .brand em{font-style:italic;font-weight:400;color:var(--aqua)}
.topbar .brand .badge{font-family:'Manrope',sans-serif;font-size:9px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;background:var(--gold);color:var(--coal);padding:3px 8px;border-radius:4px;margin-left:6px}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar-right .user-name{font-size:13px;color:var(--mist);font-weight:600}
.btn-sm{padding:8px 16px;border-radius:8px;font-weight:700;font-size:13px;border:none;cursor:pointer;font-family:'Manrope',sans-serif;transition:all .2s}
.btn-sm:hover{transform:translateY(-1px)}
.btn-logout{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15)}
.btn-logout:hover{background:rgba(255,255,255,.15)}
.btn-site{background:transparent;color:var(--aqua);font-size:13px;font-weight:600}
.btn-site:hover{color:#fff}

/* ===== LOGIN VIEW ===== */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(170deg,#061e36 0%,#072b4c 40%,#0a3e6f 100%);padding:24px}
.login-card{background:var(--ink);border:1px solid rgba(59,196,242,.15);border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 32px 64px rgba(0,0,0,.4)}
.login-card .logo{text-align:center;margin-bottom:28px}
.login-card .logo .brand-text{font-family:'Fraunces',serif;font-weight:900;font-size:24px;color:#fff;margin-top:10px}
.login-card .logo .brand-text em{font-style:italic;font-weight:400;color:var(--aqua)}
.login-card .logo .sub{font-size:12px;font-weight:700;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-top:6px}
.login-card h2{font-family:'Fraunces',serif;font-weight:900;font-size:24px;color:#fff;text-align:center;margin-bottom:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--mist);margin-bottom:6px}
.field input{width:100%;font-family:'Manrope',sans-serif;font-size:15px;font-weight:500;padding:13px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff;outline:none;transition:border .2s}
.field input::placeholder{color:rgba(255,255,255,.3)}
.field input:focus{border-color:var(--aqua)}
.login-btn{width:100%;padding:14px;border-radius:10px;background:var(--gold);color:var(--coal);font-family:'Manrope',sans-serif;font-size:16px;font-weight:800;border:none;cursor:pointer;transition:all .2s;margin-top:8px}
.login-btn:hover{background:var(--gold-dk);transform:translateY(-1px)}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.login-error{color:var(--red);font-size:13px;text-align:center;margin-top:12px;display:none}
.login-error.show{display:block}
.login-back{text-align:center;margin-top:20px}
.login-back a{color:var(--mist);font-size:13px;font-weight:600}
.login-back a:hover{color:#fff}

/* ===== DASHBOARD ===== */
.dashboard{display:none;padding:28px 24px 60px;max-width:1100px;margin:0 auto}
.dashboard.show{display:block}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:28px;background:#fff;border-radius:12px;padding:4px;border:1px solid rgba(15,74,122,.08);width:fit-content}
.tab{padding:10px 22px;border-radius:9px;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;color:#5a7590;background:transparent;border:none;font-family:'Manrope',sans-serif}
.tab.active{background:var(--ink);color:#fff;box-shadow:0 2px 8px rgba(4,22,40,.15)}
.tab:hover:not(.active){color:var(--ink);background:var(--foam)}

/* Cards */
.card{background:#fff;border:1px solid rgba(15,74,122,.08);border-radius:16px;padding:28px;margin-bottom:20px;box-shadow:0 1px 3px rgba(4,22,40,.04)}
.card h3{font-family:'Fraunces',serif;font-weight:800;font-size:20px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.card h3 .ic{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;flex-shrink:0}

/* ===== AVAILABILITY TAB ===== */
.tab-content{display:none}
.tab-content.active{display:block}

.day-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:24px}
.day-card{padding:14px;border:2px solid rgba(15,74,122,.1);border-radius:12px;text-align:center;cursor:pointer;transition:all .2s;background:#fff}
.day-card:hover{border-color:var(--aqua);transform:translateY(-2px);box-shadow:0 6px 20px rgba(15,74,122,.08)}
.day-card.selected{border-color:var(--aqua);background:rgba(59,196,242,.04);box-shadow:0 0 0 3px rgba(59,196,242,.12)}
.day-card.today{border-color:var(--gold)}
.day-card .day-name{font-weight:800;font-size:13px;color:var(--ink);letter-spacing:.04em}
.day-card .day-date{font-family:'Fraunces',serif;font-weight:900;font-size:24px;color:var(--deep);margin:2px 0}
.day-card .day-month{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:#5a7590}
.day-card .day-slots{margin-top:8px;font-size:11px;font-weight:700;color:var(--mid);padding:3px 8px;background:var(--foam);border-radius:4px;display:inline-block}
.day-card .day-slots.none{color:#999;background:#f5f5f5}
.day-card.today .day-name{color:var(--gold-dk)}

.slot-manager{background:var(--foam);border-radius:14px;padding:24px;margin-bottom:20px;display:none}
.slot-manager.show{display:block}
.slot-manager-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.slot-manager-header h4{font-family:'Fraunces',serif;font-weight:800;font-size:18px;color:var(--ink)}
.slot-manager-actions{display:flex;gap:8px}
.slot-manager-actions .btn-sm{font-size:12px;padding:7px 14px;border-radius:7px}
.btn-add-all{background:var(--aqua);color:var(--ink)}
.btn-add-all:hover{background:var(--aqua-lt)}
.btn-remove-all{background:transparent;color:var(--red);border:1px solid var(--red)}
.btn-remove-all:hover{background:rgba(248,113,113,.08)}

.slot-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.slot-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:#fff;border-radius:10px;border:1px solid rgba(15,74,122,.08);transition:all .2s}
.slot-row:hover{border-color:rgba(15,74,122,.15)}
.slot-row .slot-info{display:flex;align-items:center;gap:12px}
.slot-row .slot-time{font-weight:800;font-size:15px;color:var(--ink)}
.slot-row .slot-period{font-size:11px;font-weight:700;color:#5a7590;text-transform:uppercase;letter-spacing:.1em}
.slot-row .slot-status{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:5px}
.slot-row .slot-status.available{background:rgba(52,211,153,.1);color:var(--green)}
.slot-row .slot-status.booked{background:rgba(59,196,242,.1);color:var(--aqua)}
.slot-row .slot-status.off{background:#f5f5f5;color:#aaa}

/* Toggle switch */
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;cursor:pointer;inset:0;background:#d1d5db;border-radius:24px;transition:.25s}
.toggle .slider::before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle input:checked+.slider{background:var(--aqua)}
.toggle input:checked+.slider::before{transform:translateX(20px)}
.toggle input:disabled+.slider{opacity:.5;cursor:not-allowed}

/* ===== BOOKINGS TAB ===== */
.booking-filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.filter-btn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:700;border:1px solid rgba(15,74,122,.12);background:#fff;color:#5a7590;cursor:pointer;font-family:'Manrope',sans-serif;transition:all .15s}
.filter-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.filter-btn:hover:not(.active){background:var(--foam)}

.bookings-list{display:flex;flex-direction:column;gap:10px}
.booking-item{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;padding:18px 20px;background:#fff;border-radius:12px;border:1px solid rgba(15,74,122,.08);transition:all .2s}
.booking-item:hover{border-color:rgba(15,74,122,.15);box-shadow:0 4px 12px rgba(4,22,40,.05)}
.booking-detail{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.booking-detail .bd{font-size:13px;color:#5a7590}
.booking-detail .bd strong{display:block;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);margin-bottom:2px}
.booking-actions{display:flex;gap:6px;flex-shrink:0}
.badge-status{padding:5px 12px;border-radius:6px;font-size:10px;font-weight:800;letter-spacing:.15em;text-transform:uppercase}
.badge-status.pending{background:rgba(251,191,36,.1);color:var(--gold-dk)}
.badge-status.confirmed{background:rgba(59,196,242,.1);color:var(--mid)}
.badge-status.completed{background:rgba(52,211,153,.1);color:#059669}
.btn-action{padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;border:1px solid rgba(15,74,122,.12);background:#fff;cursor:pointer;font-family:'Manrope',sans-serif;transition:all .15s}
.btn-action:hover{background:var(--foam)}
.btn-action.confirm{color:var(--mid);border-color:var(--mid)}
.btn-action.complete{color:#059669;border-color:#059669}
.btn-action.delete{color:var(--red);border-color:var(--red)}

.empty-state{text-align:center;padding:48px 24px;color:#5a7590}
.empty-state .icon{font-size:40px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:14px}

/* Loading spinner */
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner.dark{border-color:rgba(15,74,122,.15);border-top-color:var(--mid)}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .dashboard{padding:20px 16px 40px}
  .day-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
  .slot-list{grid-template-columns:1fr}
  .booking-item{grid-template-columns:1fr;gap:12px}
  .booking-detail{grid-template-columns:1fr 1fr}
  .tabs{width:100%}
  .tab{flex:1;text-align:center;padding:10px 12px;font-size:13px}
}
</style>
</head>
<body>

<!-- ===== LOGIN VIEW ===== -->
<div id="loginView" class="login-wrap">
  <div class="login-card">
    <div class="logo">
      <svg width="36" height="42" viewBox="0 0 20 24" fill="none"><path d="M10 1C14 7 19 13 19 17a9 9 0 0 1-18 0c0-4 5-10 9-16z" fill="#3bc4f2"/><ellipse cx="7" cy="13" rx="3" ry="1.5" fill="#fff" opacity=".7" transform="rotate(-30 7 13)"/></svg>
      <div class="brand-text">Pristine <em>Powerwashing</em></div>
      <div class="sub">Admin Panel</div>
    </div>
    <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="you@email.com"></div>
    <div class="field"><label>Password</label><input type="password" id="loginPass" placeholder="Enter password"></div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-back"><a href="index.html">&larr; Back to website</a></div>
  </div>
</div>

<!-- ===== DASHBOARD VIEW ===== -->
<div id="dashView" style="display:none">
  <div class="topbar">
    <div class="brand">
      <svg width="18" height="22" viewBox="0 0 20 24" fill="none"><path d="M10 1C14 7 19 13 19 17a9 9 0 0 1-18 0c0-4 5-10 9-16z" fill="#3bc4f2"/><ellipse cx="7" cy="13" rx="3" ry="1.5" fill="#fff" opacity=".7" transform="rotate(-30 7 13)"/></svg>
      Pristine <em>Powerwashing</em>
      <span class="badge">Admin</span>
    </div>
    <div class="topbar-right">
      <a href="index.html" class="btn-site">&larr; View Site</a>
      <button class="btn-sm btn-logout" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <div class="dashboard show" id="dashboard">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="availability" onclick="switchTab('availability')">Manage Availability</button>
      <button class="tab" data-tab="bookings" onclick="switchTab('bookings')">Bookings</button>
    </div>

    <!-- ===== AVAILABILITY TAB ===== -->
    <div class="tab-content active" id="tab-availability">
      <div class="card">
        <h3>
          <span class="ic" style="background:var(--aqua);color:var(--ink)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
          Select a Day
        </h3>
        <div class="day-grid" id="dayGrid"></div>
      </div>

      <div class="slot-manager" id="slotManager">
        <div class="slot-manager-header">
          <h4 id="slotManagerTitle">—</h4>
          <div class="slot-manager-actions">
            <button class="btn-sm btn-add-all" onclick="addAllSlots()">Add All Slots</button>
            <button class="btn-sm btn-remove-all" onclick="removeAllSlots()">Remove Unbkd</button>
          </div>
        </div>
        <div class="slot-list" id="slotList"></div>
      </div>
    </div>

    <!-- ===== BOOKINGS TAB ===== -->
    <div class="tab-content" id="tab-bookings">
      <div class="card">
        <h3>
          <span class="ic" style="background:var(--gold);color:var(--coal)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>
          Bookings
        </h3>
        <div class="booking-filters">
          <button class="filter-btn active" data-filter="all" onclick="filterBookings('all')">All</button>
          <button class="filter-btn" data-filter="pending" onclick="filterBookings('pending')">Pending</button>
          <button class="filter-btn" data-filter="confirmed" onclick="filterBookings('confirmed')">Confirmed</button>
          <button class="filter-btn" data-filter="completed" onclick="filterBookings('completed')">Completed</button>
        </div>
        <div class="bookings-list" id="bookingsList">
          <div class="empty-state"><div class="icon">📋</div><p>Loading bookings...</p></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== FIREBASE =====
firebase.initializeApp({
  projectId: "pristine-powerwash-app",
  appId: "1:1025511095450:web:0b6d6ff05f18bb0653f323",
  storageBucket: "pristine-powerwash-app.firebasestorage.app",
  apiKey: "AIzaSyBsuZ_aG7_tFf8rKCrRvLaPjSmc-2XZ27E",
  authDomain: "pristine-powerwash-app.firebaseapp.com",
  messagingSenderId: "1025511095450"
});
const db = firebase.firestore();
const auth = firebase.auth();

// ===== TIME SLOT DEFINITIONS =====
const TIME_SLOTS = [
  { time: '8:00 AM', period: 'Morning', sort: 0 },
  { time: '9:30 AM', period: 'Morning', sort: 1 },
  { time: '11:00 AM', period: 'Late Morning', sort: 2 },
  { time: '1:00 PM', period: 'Afternoon', sort: 3 },
  { time: '2:30 PM', period: 'Afternoon', sort: 4 },
  { time: '4:00 PM', period: 'Late Afternoon', sort: 5 }
];

// ===== AUTH STATE =====
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('dashView').style.display = 'block';
    initDashboard();
  } else {
    document.getElementById('loginView').style.display = 'flex';
    document.getElementById('dashView').style.display = 'none';
  }
});

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');

  if (!email || !pass) { err.textContent = 'Enter email and password.'; err.classList.add('show'); return; }

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  err.classList.remove('show');

  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch (e) {
    err.textContent = e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential'
      ? 'Invalid email or password.'
      : e.message;
    err.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

function doLogout() {
  auth.signOut();
}

// Enter key on password field
document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ===== DASHBOARD =====
let selectedDate = null;
let allSlots = {};    // { "2026-04-16": { "8:00 AM": { id, booked, bookingId }, ... } }
let allBookings = [];
let currentFilter = 'all';

async function initDashboard() {
  await loadAllSlots();
  buildDayGrid();
  loadBookings();
}

// ===== TABS =====
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + name));
  if (name === 'bookings') loadBookings();
}

// ===== LOAD ALL SLOTS FROM FIRESTORE =====
async function loadAllSlots() {
  const today = formatDate(new Date());
  allSlots = {};

  try {
    const snap = await db.collection('availableSlots')
      .where('date', '>=', today)
      .get();

    snap.forEach(doc => {
      const d = doc.data();
      if (!allSlots[d.date]) allSlots[d.date] = {};
      allSlots[d.date][d.time] = {
        id: doc.id,
        booked: d.booked || false,
        bookingId: d.bookingId || null
      };
    });
  } catch (e) {
    console.warn('Failed to load slots:', e);
  }
}

// ===== DAY GRID =====
function buildDayGrid() {
  const grid = document.getElementById('dayGrid');
  grid.innerHTML = '';

  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now = new Date();

  for (let i = 0; i < 14; i++) {
    const date = new Date(now);
    date.setDate(date.getDate() + i);

    const dateStr = formatDate(date);
    const isToday = i === 0;
    const isSunday = date.getDay() === 0;

    const slotsForDay = allSlots[dateStr] || {};
    const slotCount = Object.keys(slotsForDay).length;
    const bookedCount = Object.values(slotsForDay).filter(s => s.booked).length;

    const card = document.createElement('div');
    card.className = 'day-card' + (isToday ? ' today' : '') + (selectedDate === dateStr ? ' selected' : '');
    if (isSunday) card.style.opacity = '.45';

    let slotText = slotCount === 0 ? 'No slots' : `${slotCount} slot${slotCount > 1 ? 's' : ''}`;
    if (bookedCount > 0) slotText += ` (${bookedCount} booked)`;

    card.innerHTML = `
      <div class="day-name">${isToday ? 'Today' : dayNames[date.getDay()]}</div>
      <div class="day-date">${date.getDate()}</div>
      <div class="day-month">${monthNames[date.getMonth()]}</div>
      <div class="day-slots ${slotCount === 0 ? 'none' : ''}">${slotText}</div>
    `;

    card.addEventListener('click', () => selectDay(dateStr, date));
    grid.appendChild(card);
  }
}

function selectDay(dateStr, dateObj) {
  selectedDate = dateStr;
  buildDayGrid();
  showSlotManager(dateStr, dateObj);
}

// ===== SLOT MANAGER =====
function showSlotManager(dateStr, dateObj) {
  const manager = document.getElementById('slotManager');
  manager.classList.add('show');

  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('slotManagerTitle').textContent =
    dayNames[dateObj.getDay()] + ', ' + monthNames[dateObj.getMonth()] + ' ' + dateObj.getDate();

  renderSlots(dateStr);
}

function renderSlots(dateStr) {
  const list = document.getElementById('slotList');
  list.innerHTML = '';

  const daySlots = allSlots[dateStr] || {};

  TIME_SLOTS.forEach(ts => {
    const existing = daySlots[ts.time];
    const isOn = !!existing;
    const isBooked = existing && existing.booked;

    const row = document.createElement('div');
    row.className = 'slot-row';

    let statusHTML;
    if (isBooked) {
      statusHTML = '<span class="slot-status booked">Booked</span>';
    } else if (isOn) {
      statusHTML = '<span class="slot-status available">Available</span>';
    } else {
      statusHTML = '<span class="slot-status off">Off</span>';
    }

    row.innerHTML = `
      <div class="slot-info">
        <label class="toggle">
          <input type="checkbox" ${isOn ? 'checked' : ''} ${isBooked ? 'disabled' : ''}
            onchange="toggleSlot('${dateStr}', '${ts.time}', '${ts.period}', ${ts.sort}, this.checked)">
          <span class="slider"></span>
        </label>
        <div>
          <div class="slot-time">${ts.time}</div>
          <div class="slot-period">${ts.period}</div>
        </div>
      </div>
      ${statusHTML}
    `;

    list.appendChild(row);
  });
}

async function toggleSlot(dateStr, time, period, sort, turnOn) {
  const daySlots = allSlots[dateStr] || {};

  if (turnOn) {
    // Add slot to Firestore
    try {
      const docRef = await db.collection('availableSlots').add({
        date: dateStr,
        time: time,
        period: period,
        sort: sort,
        booked: false,
        bookingId: null
      });
      if (!allSlots[dateStr]) allSlots[dateStr] = {};
      allSlots[dateStr][time] = { id: docRef.id, booked: false, bookingId: null };
    } catch (e) {
      console.error('Failed to add slot:', e);
      alert('Failed to add slot. Check your connection.');
      renderSlots(dateStr);
      return;
    }
  } else {
    // Remove slot from Firestore
    const slot = daySlots[time];
    if (!slot || slot.booked) return;
    try {
      await db.collection('availableSlots').doc(slot.id).delete();
      delete allSlots[dateStr][time];
    } catch (e) {
      console.error('Failed to remove slot:', e);
      alert('Failed to remove slot. Check your connection.');
      renderSlots(dateStr);
      return;
    }
  }

  buildDayGrid();
  renderSlots(dateStr);
}

async function addAllSlots() {
  if (!selectedDate) return;

  const daySlots = allSlots[selectedDate] || {};
  const toAdd = TIME_SLOTS.filter(ts => !daySlots[ts.time]);

  if (toAdd.length === 0) return;

  for (const ts of toAdd) {
    try {
      const docRef = await db.collection('availableSlots').add({
        date: selectedDate,
        time: ts.time,
        period: ts.period,
        sort: ts.sort,
        booked: false,
        bookingId: null
      });
      if (!allSlots[selectedDate]) allSlots[selectedDate] = {};
      allSlots[selectedDate][ts.time] = { id: docRef.id, booked: false, bookingId: null };
    } catch (e) {
      console.error('Failed to add slot:', e);
    }
  }

  buildDayGrid();
  renderSlots(selectedDate);
}

async function removeAllSlots() {
  if (!selectedDate) return;

  const daySlots = allSlots[selectedDate] || {};
  const toRemove = Object.entries(daySlots).filter(([, s]) => !s.booked);

  if (toRemove.length === 0) return;
  if (!confirm('Remove all unbooked slots for this day?')) return;

  for (const [time, slot] of toRemove) {
    try {
      await db.collection('availableSlots').doc(slot.id).delete();
      delete allSlots[selectedDate][time];
    } catch (e) {
      console.error('Failed to remove slot:', e);
    }
  }

  buildDayGrid();
  renderSlots(selectedDate);
}

// ===== BOOKINGS =====
async function loadBookings() {
  const list = document.getElementById('bookingsList');
  list.innerHTML = '<div class="empty-state"><div class="spinner dark" style="margin:0 auto 12px;display:block;width:24px;height:24px"></div><p>Loading bookings...</p></div>';

  try {
    const snap = await db.collection('bookings')
      .orderBy('timestamp', 'desc')
      .limit(50)
      .get();

    allBookings = [];
    snap.forEach(doc => {
      allBookings.push({ id: doc.id, ...doc.data() });
    });

    renderBookings();
  } catch (e) {
    console.error('Failed to load bookings:', e);
    list.innerHTML = '<div class="empty-state"><p>Failed to load bookings. Make sure Firestore rules allow admin reads.</p></div>';
  }
}

function renderBookings() {
  const list = document.getElementById('bookingsList');
  const filtered = currentFilter === 'all' ? allBookings : allBookings.filter(b => b.status === currentFilter);

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>No ' + (currentFilter === 'all' ? '' : currentFilter + ' ') + 'bookings found.</p></div>';
    return;
  }

  list.innerHTML = '';
  filtered.forEach(b => {
    const item = document.createElement('div');
    item.className = 'booking-item';

    const ts = b.timestamp ? new Date(b.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '—';
    const status = b.status || 'pending';

    let actionsHTML = '';
    if (status === 'pending') {
      actionsHTML = `<button class="btn-action confirm" onclick="updateBookingStatus('${b.id}','confirmed')">Confirm</button>`;
    } else if (status === 'confirmed') {
      actionsHTML = `<button class="btn-action complete" onclick="updateBookingStatus('${b.id}','completed')">Complete</button>`;
    }
    actionsHTML += `<button class="btn-action delete" onclick="deleteBooking('${b.id}')">Delete</button>`;

    item.innerHTML = `
      <div class="booking-detail">
        <div class="bd"><strong>Customer</strong>${esc(b.name || '—')}</div>
        <div class="bd"><strong>Service</strong>${esc(b.service || '—')} — $${b.price || '—'}</div>
        <div class="bd"><strong>Phone</strong>${esc(b.phone || '—')}</div>
        <div class="bd"><strong>Time Slot</strong>${esc(b.timeSlot || '—')}</div>
        <div class="bd"><strong>Address</strong>${esc(b.address || '—')}</div>
        <div class="bd"><strong>Submitted</strong>${ts}</div>
        ${b.notes ? `<div class="bd"><strong>Notes</strong>${esc(b.notes)}</div>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
        <span class="badge-status ${status}">${status}</span>
        <div class="booking-actions">${actionsHTML}</div>
      </div>
    `;

    list.appendChild(item);
  });
}

function filterBookings(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === filter));
  renderBookings();
}

async function updateBookingStatus(id, newStatus) {
  try {
    await db.collection('bookings').doc(id).update({ status: newStatus });
    const b = allBookings.find(x => x.id === id);
    if (b) b.status = newStatus;
    renderBookings();
  } catch (e) {
    console.error('Failed to update:', e);
    alert('Failed to update booking status.');
  }
}

async function deleteBooking(id) {
  if (!confirm('Delete this booking?')) return;
  try {
    // Find booking to get its slot reference
    const booking = allBookings.find(x => x.id === id);

    await db.collection('bookings').doc(id).delete();

    // If booking had a slot, free it up
    if (booking && booking.slotId) {
      try {
        await db.collection('availableSlots').doc(booking.slotId).update({
          booked: false,
          bookingId: null
        });
      } catch (e) { /* slot may already be deleted */ }
    }

    allBookings = allBookings.filter(x => x.id !== id);
    renderBookings();
    // Refresh slots too
    await loadAllSlots();
    buildDayGrid();
    if (selectedDate) renderSlots(selectedDate);
  } catch (e) {
    console.error('Failed to delete:', e);
    alert('Failed to delete booking.');
  }
}

// ===== HELPERS =====
function formatDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
