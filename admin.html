<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#0b1d3a"/>
<title>Admin — Pristine Powerwashing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

<style>
/* DESIGN TOKENS */
:root{
  --brand-400:#60a5fa; --brand-500:#3b82f6; --brand-600:#2563eb; --brand-700:#1d4ed8; --brand-800:#1e40af; --brand-900:#1e3a8a;
  --ice-300:#7dd3fc; --ice-400:#38bdf8; --ice-500:#0ea5e9;
  --amber-300:#fcd34d; --amber-400:#fbbf24; --amber-500:#f59e0b;
  --green:#10b981; --green-light:#34d399;
  --red:#ef4444; --red-light:#f87171;
  --radius-sm:8px; --radius:12px; --radius-md:16px; --radius-lg:20px;
  --shadow-sm:0 1px 2px rgba(15,23,42,.06), 0 1px 3px rgba(15,23,42,.04);
  --shadow:0 4px 12px rgba(15,23,42,.08), 0 2px 4px rgba(15,23,42,.04);
  --shadow-lg:0 24px 48px -12px rgba(15,23,42,.18);
  --shadow-blue:0 14px 36px -12px rgba(37,99,235,.35);

  /* Dark theme (default — automatic dark, softer blues) */
  --bg:#0b1d3a;
  --bg-alt:#102849;
  --surface:#163261;
  --surface-2:#1b3d72;
  --surface-glass:rgba(22,50,97,.72);
  --border:rgba(96,165,250,.2);
  --border-strong:rgba(96,165,250,.32);
  --text:#e9f0fc;
  --text-muted:#b2c5e0;
  --text-subtle:#8aa2c2;
  --accent:var(--brand-400);
  --accent-hover:var(--brand-300);
  --accent-contrast:#061432;
  --ring:rgba(96,165,250,.45);
  --login-bg:linear-gradient(135deg,#0d2150 0%,#1a3a80 55%,#2563eb 100%);
  --topbar-bg:linear-gradient(135deg,#0a1e3e 0%,#133060 100%);
}

/* Light theme override — only when user explicitly toggles */
[data-theme="light"]{
  --bg:#eef4fb; --bg-alt:#dde9f6; --surface:#ffffff; --surface-2:#f5f9ff;
  --surface-glass:rgba(255,255,255,.72);
  --border:rgba(30,64,175,.12); --border-strong:rgba(30,64,175,.22);
  --text:#0b1c36; --text-muted:#516a8a; --text-subtle:#7b93b4;
  --accent:var(--brand-600); --accent-hover:var(--brand-700); --accent-contrast:#ffffff;
  --ring:rgba(59,130,246,.35);
  --login-bg:linear-gradient(135deg,#0b1c36 0%,#1e3a8a 55%,#1d4ed8 100%);
  --topbar-bg:linear-gradient(135deg,#0b1c36 0%,#0f2d5a 100%);
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;color-scheme:dark light}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  color:var(--text);background:var(--bg);line-height:1.6;min-height:100vh;
  -webkit-font-smoothing:antialiased;
  transition:background .4s ease,color .4s ease;
}
a{color:var(--accent);text-decoration:none}
::selection{background:var(--brand-500);color:#fff}

/* TOPBAR */
.topbar{
  background:var(--topbar-bg);color:#fff;
  padding:14px 24px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;gap:16px;
  border-bottom:1px solid rgba(96,165,250,.1);
}
.topbar .brand{
  font-family:'Fraunces',serif;font-weight:900;font-size:20px;
  display:flex;align-items:center;gap:12px;
}
.brand-mark{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--brand-500),var(--ice-500));
  display:grid;place-items:center;
  box-shadow:0 6px 18px -6px var(--brand-500),inset 0 1px 0 rgba(255,255,255,.25);
}
.topbar .brand em{font-style:italic;font-weight:400;color:var(--ice-300)}
.admin-pill{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:800;letter-spacing:.2em;
  text-transform:uppercase;
  background:linear-gradient(135deg,var(--amber-400),var(--amber-500));color:#3a2a0a;
  padding:4px 9px;border-radius:5px;margin-left:4px;
}
.topbar-right{display:flex;align-items:center;gap:10px}
.btn-sm{
  padding:8px 14px;border-radius:8px;font-weight:600;font-size:13px;
  border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:all .18s;
  display:inline-flex;align-items:center;gap:6px;
}
.btn-sm:hover{transform:translateY(-1px)}
.btn-logout{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.12)}
.btn-logout:hover{background:rgba(255,255,255,.14)}
.btn-site{background:transparent;color:var(--ice-300);font-size:13px;font-weight:500;padding:8px 10px}
.btn-site:hover{color:#fff;background:rgba(255,255,255,.08)}

.theme-toggle-sm{
  width:34px;height:34px;border-radius:8px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.75);cursor:pointer;display:grid;place-items:center;
  transition:all .2s;
}
.theme-toggle-sm:hover{color:#fff;background:rgba(255,255,255,.14)}
.theme-toggle-sm svg{width:16px;height:16px}
.theme-toggle-sm .sun{display:block}
.theme-toggle-sm .moon{display:none}
[data-theme="light"] .theme-toggle-sm .sun{display:none}
[data-theme="light"] .theme-toggle-sm .moon{display:block}

/* LOGIN */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--login-bg);padding:24px;position:relative;overflow:hidden;
}
.login-wrap::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(40% 50% at 10% 10%,rgba(125,211,252,.2),transparent 60%),
    radial-gradient(45% 50% at 90% 90%,rgba(96,165,250,.22),transparent 60%);
}
.login-card{
  position:relative;z-index:1;
  background:rgba(14,33,66,.82);backdrop-filter:blur(20px);
  border:1px solid rgba(96,165,250,.18);border-radius:var(--radius-lg);
  padding:44px 40px;width:100%;max-width:420px;
  box-shadow:0 40px 80px rgba(0,0,0,.4);
  color:#fff;
}
.login-card .logo{text-align:center;margin-bottom:32px}
.login-card .logo .brand-mark{width:52px;height:52px;margin:0 auto}
.login-card .logo .brand-text{
  font-family:'Fraunces',serif;font-weight:900;font-size:24px;color:#fff;margin-top:14px;
  letter-spacing:-.02em;
}
.login-card .logo .brand-text em{font-style:italic;font-weight:400;color:var(--ice-300)}
.login-card .logo .sub{
  font-size:11px;font-weight:700;letter-spacing:.35em;text-transform:uppercase;
  color:var(--amber-300);margin-top:8px;
}
.login-card h2{font-family:'Fraunces',serif;font-weight:800;font-size:24px;color:#fff;text-align:center;margin-bottom:24px;letter-spacing:-.02em}
.login-card .field label{display:block;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:7px}
.login-card .field input{
  width:100%;font-family:'Inter',sans-serif;font-size:15px;font-weight:500;
  padding:13px 16px;border-radius:10px;
  border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:#fff;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.login-card .field input::placeholder{color:rgba(255,255,255,.3)}
.login-card .field input:focus{border-color:var(--ice-400);box-shadow:0 0 0 3px rgba(56,189,248,.2)}
.login-card .field{margin-bottom:16px}
.login-btn{
  width:100%;padding:14px;border-radius:10px;
  background:linear-gradient(135deg,var(--brand-400),var(--ice-400));color:#051226;
  font-family:'Inter',sans-serif;font-size:15px;font-weight:700;
  border:none;cursor:pointer;transition:all .2s;margin-top:8px;
  box-shadow:0 10px 28px -10px var(--brand-400);
}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 16px 36px -10px var(--brand-400)}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.login-error{color:var(--red-light);font-size:13px;text-align:center;margin-top:14px;display:none}
.login-error.show{display:block}
.login-back{text-align:center;margin-top:22px}
.login-back a{color:rgba(255,255,255,.6);font-size:13px;font-weight:500}
.login-back a:hover{color:#fff}

/* DASHBOARD */
.dashboard{display:none;padding:28px 24px 60px;max-width:1140px;margin:0 auto}
.dashboard.show{display:block}

.tabs{
  display:flex;gap:4px;margin-bottom:28px;
  background:var(--surface);border-radius:12px;padding:4px;
  border:1px solid var(--border);width:fit-content;box-shadow:var(--shadow-sm);
}
.tab{
  padding:10px 22px;border-radius:9px;font-weight:600;font-size:14px;
  cursor:pointer;transition:all .2s;color:var(--text-muted);
  background:transparent;border:none;font-family:'Inter',sans-serif;
}
.tab.active{background:var(--accent);color:var(--accent-contrast);box-shadow:var(--shadow-sm)}
.tab:hover:not(.active){color:var(--text);background:var(--bg-alt)}

.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-md);padding:28px;margin-bottom:20px;
  box-shadow:var(--shadow-sm);
}
.card h3{
  font-family:'Fraunces',serif;font-weight:800;font-size:20px;
  margin-bottom:20px;letter-spacing:-.01em;color:var(--text);
  display:flex;align-items:center;gap:12px;
}
.card h3 .ic{
  width:32px;height:32px;border-radius:10px;flex-shrink:0;
  display:grid;place-items:center;color:#fff;
  background:linear-gradient(135deg,var(--brand-500),var(--ice-500));
  box-shadow:0 6px 16px -6px var(--brand-500);
}
.card h3 .ic.amber{background:linear-gradient(135deg,var(--amber-400),var(--amber-500));color:#3a2a0a;box-shadow:0 6px 16px -6px var(--amber-400)}

.tab-content{display:none}
.tab-content.active{display:block}

/* DAY GRID */
.day-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.day-card{
  padding:16px 12px;border:1px solid var(--border);
  border-radius:12px;text-align:center;cursor:pointer;
  transition:all .2s;background:var(--surface-2);
  position:relative;
}
.day-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.day-card.selected{border-color:var(--accent);background:var(--bg-alt);box-shadow:0 0 0 3px var(--ring)}
.day-card.today{border-color:var(--amber-400)}
.day-card.today::before{
  content:'TODAY';position:absolute;top:-8px;right:8px;
  background:linear-gradient(135deg,var(--amber-400),var(--amber-500));color:#3a2a0a;
  font-size:8px;font-weight:800;letter-spacing:.15em;
  padding:3px 8px;border-radius:4px;
}
.day-card .day-name{font-weight:700;font-size:13px;color:var(--text);letter-spacing:.04em}
.day-card .day-date{font-family:'Fraunces',serif;font-weight:900;font-size:26px;color:var(--text);margin:2px 0;letter-spacing:-.02em}
.day-card .day-month{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--text-subtle)}
.day-card .day-slots{
  margin-top:10px;font-size:10px;font-weight:700;color:var(--accent);
  padding:4px 9px;background:var(--bg-alt);border-radius:5px;display:inline-block;
  letter-spacing:.04em;
}
.day-card .day-slots.none{color:var(--text-subtle);background:var(--surface)}

/* SLOT MANAGER */
.slot-manager{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-md);padding:24px;margin-bottom:20px;display:none;
  box-shadow:var(--shadow-sm);
}
.slot-manager.show{display:block}
.slot-manager-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.slot-manager-header h4{font-family:'Fraunces',serif;font-weight:800;font-size:18px;color:var(--text);letter-spacing:-.02em}
.slot-manager-actions{display:flex;gap:8px}
.slot-manager-actions .btn-sm{font-size:12px;padding:7px 14px;border-radius:7px}
.btn-add-all{background:linear-gradient(135deg,var(--brand-400),var(--ice-400));color:#051226}
.btn-add-all:hover{box-shadow:0 8px 18px -6px var(--brand-400)}
.btn-remove-all{background:transparent;color:var(--red);border:1px solid rgba(239,68,68,.35)}
.btn-remove-all:hover{background:rgba(239,68,68,.08);border-color:var(--red)}

.slot-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}
.slot-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;background:var(--surface-2);
  border-radius:10px;border:1px solid var(--border);transition:all .2s;
}
.slot-row:hover{border-color:var(--border-strong)}
.slot-row .slot-info{display:flex;align-items:center;gap:14px}
.slot-row .slot-time{font-weight:700;font-size:15px;color:var(--text)}
.slot-row .slot-period{font-size:10px;font-weight:600;color:var(--text-subtle);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
.slot-row .slot-status{
  font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  padding:4px 10px;border-radius:5px;
}
.slot-row .slot-status.available{background:rgba(16,185,129,.12);color:var(--green)}
.slot-row .slot-status.booked{background:rgba(59,130,246,.12);color:var(--accent)}
.slot-row .slot-status.off{background:var(--bg-alt);color:var(--text-subtle)}

/* Toggle */
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;cursor:pointer;inset:0;background:var(--border-strong);border-radius:24px;transition:.25s}
.toggle .slider::before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked+.slider{background:linear-gradient(135deg,var(--brand-500),var(--ice-500))}
.toggle input:checked+.slider::before{transform:translateX(20px)}
.toggle input:disabled+.slider{opacity:.5;cursor:not-allowed}

/* BOOKINGS */
.booking-filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{
  padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;
  border:1px solid var(--border);background:var(--surface);color:var(--text-muted);
  cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;
  letter-spacing:.02em;
}
.filter-btn.active{background:var(--accent);color:var(--accent-contrast);border-color:var(--accent)}
.filter-btn:hover:not(.active){background:var(--bg-alt);color:var(--text);border-color:var(--border-strong)}

.bookings-list{display:flex;flex-direction:column;gap:10px}
.booking-item{
  display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;
  padding:20px;background:var(--surface);border-radius:12px;
  border:1px solid var(--border);transition:all .2s;
}
.booking-item:hover{border-color:var(--border-strong);box-shadow:var(--shadow)}
.booking-detail{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.booking-detail .bd{font-size:13px;color:var(--text-muted)}
.booking-detail .bd strong{display:block;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-subtle);margin-bottom:3px}
.booking-detail .bd .val{color:var(--text);font-weight:500}
.booking-actions{display:flex;gap:6px;flex-shrink:0}

.badge-status{
  padding:5px 12px;border-radius:6px;
  font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
}
.badge-status.pending{background:rgba(251,191,36,.12);color:var(--amber-500)}
.badge-status.confirmed{background:rgba(59,130,246,.12);color:var(--accent)}
.badge-status.completed{background:rgba(16,185,129,.12);color:var(--green)}

.btn-action{
  padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;
  border:1px solid var(--border);background:var(--surface);
  cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;
  color:var(--text-muted);
}
.btn-action:hover{background:var(--bg-alt);color:var(--text)}
.btn-action.confirm{color:var(--accent);border-color:rgba(37,99,235,.35)}
.btn-action.confirm:hover{background:rgba(59,130,246,.08)}
.btn-action.complete{color:var(--green);border-color:rgba(16,185,129,.35)}
.btn-action.complete:hover{background:rgba(16,185,129,.08)}
.btn-action.delete{color:var(--red);border-color:rgba(239,68,68,.35)}
.btn-action.delete:hover{background:rgba(239,68,68,.08)}

.empty-state{text-align:center;padding:56px 24px;color:var(--text-muted)}
.empty-state .icon{font-size:42px;margin-bottom:14px;opacity:.4}
.empty-state p{font-size:14px}

.spinner{display:inline-block;width:22px;height:22px;border:2px solid var(--border-strong);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESPONSIVE */
@media(max-width:768px){
  .dashboard{padding:20px 16px 40px}
  .day-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
  .slot-list{grid-template-columns:1fr}
  .booking-item{grid-template-columns:1fr;gap:14px}
  .booking-detail{grid-template-columns:1fr 1fr}
  .tabs{width:100%}
  .tab{flex:1;text-align:center;padding:10px 12px;font-size:13px}
  .btn-site span{display:none}
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginView" class="login-wrap">
  <div class="login-card">
    <div class="logo">
      <span class="brand-mark" aria-hidden="true">
        <svg width="26" height="32" viewBox="0 0 20 24" fill="none"><path d="M10 1C14 7 19 13 19 17a9 9 0 0 1-18 0c0-4 5-10 9-16z" fill="#fff"/><ellipse cx="7" cy="13" rx="3" ry="1.5" fill="#bfdbfe" transform="rotate(-30 7 13)"/></svg>
      </span>
      <div class="brand-text">Pristine <em>Powerwashing</em></div>
      <div class="sub">Admin Panel</div>
    </div>
    <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="you@email.com" autocomplete="email"></div>
    <div class="field"><label>Password</label><input type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password"></div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-back"><a href="index.html">← Back to website</a></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashView" style="display:none">
  <div class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg width="16" height="20" viewBox="0 0 20 24" fill="none"><path d="M10 1C14 7 19 13 19 17a9 9 0 0 1-18 0c0-4 5-10 9-16z" fill="#fff"/></svg>
      </span>
      Pristine <em>Powerwashing</em>
      <span class="admin-pill">Admin</span>
    </div>
    <div class="topbar-right">
      <a href="index.html" class="btn-site"><span>← View Site</span></a>
      <button class="theme-toggle-sm" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="btn-sm btn-logout" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <div class="dashboard show" id="dashboard">
    <div class="tabs">
      <button class="tab active" data-tab="availability" onclick="switchTab('availability')">Availability</button>
      <button class="tab" data-tab="bookings" onclick="switchTab('bookings')">Bookings</button>
    </div>

    <div class="tab-content active" id="tab-availability">
      <div class="card">
        <h3>
          <span class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
          Select a Day
        </h3>
        <div class="day-grid" id="dayGrid"></div>
      </div>

      <div class="slot-manager" id="slotManager">
        <div class="slot-manager-header">
          <h4 id="slotManagerTitle">—</h4>
          <div class="slot-manager-actions">
            <button class="btn-sm btn-add-all" onclick="addAllSlots()">+ Add All Slots</button>
            <button class="btn-sm btn-remove-all" onclick="removeAllSlots()">Remove Unbkd</button>
          </div>
        </div>
        <div class="slot-list" id="slotList"></div>
      </div>
    </div>

    <div class="tab-content" id="tab-bookings">
      <div class="card">
        <h3>
          <span class="ic amber"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>
          Bookings
        </h3>
        <div class="booking-filters">
          <button class="filter-btn active" data-filter="all" onclick="filterBookings('all')">All</button>
          <button class="filter-btn" data-filter="pending" onclick="filterBookings('pending')">Pending</button>
          <button class="filter-btn" data-filter="confirmed" onclick="filterBookings('confirmed')">Confirmed</button>
          <button class="filter-btn" data-filter="completed" onclick="filterBookings('completed')">Completed</button>
        </div>
        <div class="bookings-list" id="bookingsList">
          <div class="empty-state"><div class="spinner" style="margin:0 auto 12px;display:block"></div><p>Loading bookings…</p></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== THEME — defaults to dark =====
(function(){
  const root = document.documentElement;
  const stored = localStorage.getItem('pw-theme');
  if(stored === 'light') root.setAttribute('data-theme', 'light');
  function current(){ return root.getAttribute('data-theme') === 'light' ? 'light' : 'dark'; }
  document.addEventListener('DOMContentLoaded', () => {
    const t = document.getElementById('themeToggle');
    if(!t) return;
    t.addEventListener('click', () => {
      const next = current() === 'dark' ? 'light' : 'dark';
      if(next === 'light') root.setAttribute('data-theme', 'light');
      else root.removeAttribute('data-theme');
      localStorage.setItem('pw-theme', next);
    });
  });
})();

// ===== FIREBASE =====
firebase.initializeApp({
  projectId: "pristine-powerwash-app",
  appId: "1:1025511095450:web:0b6d6ff05f18bb0653f323",
  storageBucket: "pristine-powerwash-app.firebasestorage.app",
  apiKey: "AIzaSyBsuZ_aG7_tFf8rKCrRvLaPjSmc-2XZ27E",
  authDomain: "pristine-powerwash-app.firebaseapp.com",
  messagingSenderId: "1025511095450"
});
const db = firebase.firestore();
const auth = firebase.auth();

const TIME_SLOTS = [
  { time: '10:00 AM', period: 'Morning',   sort: 0 },
  { time: '12:00 PM', period: 'Midday',    sort: 1 },
  { time: '2:00 PM',  period: 'Afternoon', sort: 2 }
];

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('dashView').style.display = 'block';
    initDashboard();
  } else {
    document.getElementById('loginView').style.display = 'flex';
    document.getElementById('dashView').style.display = 'none';
  }
});

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');

  if (!email || !pass) { err.textContent = 'Enter email and password.'; err.classList.add('show'); return; }

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  err.classList.remove('show');

  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch (e) {
    err.textContent = e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential'
      ? 'Invalid email or password.'
      : e.message;
    err.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

function doLogout() { auth.signOut(); }

document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

let selectedDate = null;
let allSlots = {};
let allBookings = [];
let currentFilter = 'all';

async function initDashboard() {
  await loadAllSlots();
  buildDayGrid();
  loadBookings();
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + name));
  if (name === 'bookings') loadBookings();
}

async function loadAllSlots() {
  const today = formatDate(new Date());
  allSlots = {};
  try {
    const snap = await db.collection('availableSlots').where('date', '>=', today).get();
    snap.forEach(doc => {
      const d = doc.data();
      if (!allSlots[d.date]) allSlots[d.date] = {};
      allSlots[d.date][d.time] = { id: doc.id, booked: d.booked || false, bookingId: d.bookingId || null };
    });
  } catch (e) { console.warn('Failed to load slots:', e); }
}

// Booking opens June 11, 2026 — admin grid starts from max(today, START_DATE)
const BOOKING_START = new Date(2026, 5, 11);
BOOKING_START.setHours(0,0,0,0);

function buildDayGrid() {
  const grid = document.getElementById('dayGrid');
  grid.innerHTML = '';
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now = new Date();
  const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const startDate = today0.getTime() >= BOOKING_START.getTime() ? today0 : BOOKING_START;

  for (let i = 0; i < 21; i++) {
    const date = new Date(startDate);
    date.setDate(startDate.getDate() + i);
    const dateStr = formatDate(date);
    const isToday = date.getTime() === today0.getTime();
    const isSunday = date.getDay() === 0;
    const slotsForDay = allSlots[dateStr] || {};
    const slotCount = Object.keys(slotsForDay).length;
    const bookedCount = Object.values(slotsForDay).filter(s => s.booked).length;

    const card = document.createElement('div');
    card.className = 'day-card' + (isToday ? ' today' : '') + (selectedDate === dateStr ? ' selected' : '');
    if (isSunday) card.style.opacity = '.45';

    let slotText = slotCount === 0 ? 'No slots' : `${slotCount} slot${slotCount > 1 ? 's' : ''}`;
    if (bookedCount > 0) slotText += ` · ${bookedCount} bkd`;

    card.innerHTML = `
      <div class="day-name">${dayNames[date.getDay()]}</div>
      <div class="day-date">${date.getDate()}</div>
      <div class="day-month">${monthNames[date.getMonth()]}</div>
      <div class="day-slots ${slotCount === 0 ? 'none' : ''}">${slotText}</div>
    `;
    card.addEventListener('click', () => selectDay(dateStr, date));
    grid.appendChild(card);
  }
}

function selectDay(dateStr, dateObj) { selectedDate = dateStr; buildDayGrid(); showSlotManager(dateStr, dateObj); }

function showSlotManager(dateStr, dateObj) {
  const manager = document.getElementById('slotManager');
  manager.classList.add('show');
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('slotManagerTitle').textContent =
    dayNames[dateObj.getDay()] + ', ' + monthNames[dateObj.getMonth()] + ' ' + dateObj.getDate();
  renderSlots(dateStr);
}

function renderSlots(dateStr) {
  const list = document.getElementById('slotList');
  list.innerHTML = '';
  const daySlots = allSlots[dateStr] || {};

  TIME_SLOTS.forEach(ts => {
    const existing = daySlots[ts.time];
    const isOn = !!existing;
    const isBooked = existing && existing.booked;

    let statusHTML;
    if (isBooked) statusHTML = '<span class="slot-status booked">Booked</span>';
    else if (isOn) statusHTML = '<span class="slot-status available">Available</span>';
    else statusHTML = '<span class="slot-status off">Off</span>';

    const row = document.createElement('div');
    row.className = 'slot-row';
    row.innerHTML = `
      <div class="slot-info">
        <label class="toggle">
          <input type="checkbox" ${isOn ? 'checked' : ''} ${isBooked ? 'disabled' : ''}
            onchange="toggleSlot('${dateStr}', '${ts.time}', '${ts.period}', ${ts.sort}, this.checked)">
          <span class="slider"></span>
        </label>
        <div>
          <div class="slot-time">${ts.time}</div>
          <div class="slot-period">${ts.period}</div>
        </div>
      </div>
      ${statusHTML}
    `;
    list.appendChild(row);
  });
}

async function toggleSlot(dateStr, time, period, sort, turnOn) {
  const daySlots = allSlots[dateStr] || {};

  if (turnOn) {
    try {
      const docRef = await db.collection('availableSlots').add({
        date: dateStr, time, period, sort, booked: false, bookingId: null
      });
      if (!allSlots[dateStr]) allSlots[dateStr] = {};
      allSlots[dateStr][time] = { id: docRef.id, booked: false, bookingId: null };
    } catch (e) { console.error('Failed to add slot:', e); alert('Failed to add slot. Check your connection.'); renderSlots(dateStr); return; }
  } else {
    const slot = daySlots[time];
    if (!slot || slot.booked) return;
    try {
      await db.collection('availableSlots').doc(slot.id).delete();
      delete allSlots[dateStr][time];
    } catch (e) { console.error('Failed to remove slot:', e); alert('Failed to remove slot. Check your connection.'); renderSlots(dateStr); return; }
  }
  buildDayGrid();
  renderSlots(dateStr);
}

async function addAllSlots() {
  if (!selectedDate) return;
  const daySlots = allSlots[selectedDate] || {};
  const toAdd = TIME_SLOTS.filter(ts => !daySlots[ts.time]);
  if (toAdd.length === 0) return;
  for (const ts of toAdd) {
    try {
      const docRef = await db.collection('availableSlots').add({
        date: selectedDate, time: ts.time, period: ts.period, sort: ts.sort, booked: false, bookingId: null
      });
      if (!allSlots[selectedDate]) allSlots[selectedDate] = {};
      allSlots[selectedDate][ts.time] = { id: docRef.id, booked: false, bookingId: null };
    } catch (e) { console.error('Failed to add slot:', e); }
  }
  buildDayGrid();
  renderSlots(selectedDate);
}

async function removeAllSlots() {
  if (!selectedDate) return;
  const daySlots = allSlots[selectedDate] || {};
  const toRemove = Object.entries(daySlots).filter(([, s]) => !s.booked);
  if (toRemove.length === 0) return;
  if (!confirm('Remove all unbooked slots for this day?')) return;
  for (const [time, slot] of toRemove) {
    try {
      await db.collection('availableSlots').doc(slot.id).delete();
      delete allSlots[selectedDate][time];
    } catch (e) { console.error('Failed to remove slot:', e); }
  }
  buildDayGrid();
  renderSlots(selectedDate);
}

async function loadBookings() {
  const list = document.getElementById('bookingsList');
  list.innerHTML = '<div class="empty-state"><div class="spinner" style="margin:0 auto 12px;display:block"></div><p>Loading bookings…</p></div>';
  try {
    const snap = await db.collection('bookings').orderBy('timestamp', 'desc').limit(50).get();
    allBookings = [];
    snap.forEach(doc => { allBookings.push({ id: doc.id, ...doc.data() }); });
    renderBookings();
  } catch (e) {
    console.error('Failed to load bookings:', e);
    list.innerHTML = '<div class="empty-state"><p>Failed to load bookings. Make sure Firestore rules allow admin reads.</p></div>';
  }
}

function renderBookings() {
  const list = document.getElementById('bookingsList');
  const filtered = currentFilter === 'all' ? allBookings : allBookings.filter(b => b.status === currentFilter);

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>No ' + (currentFilter === 'all' ? '' : currentFilter + ' ') + 'bookings found.</p></div>';
    return;
  }

  list.innerHTML = '';
  filtered.forEach(b => {
    const item = document.createElement('div');
    item.className = 'booking-item';
    const ts = b.timestamp ? new Date(b.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '—';
    const status = b.status || 'pending';

    let actionsHTML = '';
    if (status === 'pending') actionsHTML = `<button class="btn-action confirm" onclick="updateBookingStatus('${b.id}','confirmed')">Confirm</button>`;
    else if (status === 'confirmed') actionsHTML = `<button class="btn-action complete" onclick="updateBookingStatus('${b.id}','completed')">Complete</button>`;
    actionsHTML += `<button class="btn-action delete" onclick="deleteBooking('${b.id}')">Delete</button>`;

    item.innerHTML = `
      <div class="booking-detail">
        <div class="bd"><strong>Customer</strong><span class="val">${esc(b.name || '—')}</span></div>
        <div class="bd"><strong>Service</strong><span class="val">${esc(b.service || '—')} — $${b.price || '—'}</span></div>
        <div class="bd"><strong>Phone</strong><span class="val">${esc(b.phone || '—')}</span></div>
        ${b.email ? `<div class="bd"><strong>Email</strong><span class="val">${esc(b.email)}</span></div>` : ''}
        <div class="bd"><strong>Time Slot</strong><span class="val">${esc(b.timeSlot || '—')}</span></div>
        <div class="bd"><strong>Address</strong><span class="val">${esc(b.address || '—')}</span></div>
        <div class="bd"><strong>Submitted</strong><span class="val">${ts}</span></div>
        ${b.notes ? `<div class="bd"><strong>Notes</strong><span class="val">${esc(b.notes)}</span></div>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px">
        <span class="badge-status ${status}">${status}</span>
        <div class="booking-actions">${actionsHTML}</div>
      </div>
    `;
    list.appendChild(item);
  });
}

function filterBookings(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === filter));
  renderBookings();
}

async function updateBookingStatus(id, newStatus) {
  try {
    await db.collection('bookings').doc(id).update({ status: newStatus });
    const b = allBookings.find(x => x.id === id);
    if (b) b.status = newStatus;
    renderBookings();
  } catch (e) { console.error('Failed to update:', e); alert('Failed to update booking status.'); }
}

async function deleteBooking(id) {
  if (!confirm('Delete this booking?')) return;
  try {
    const booking = allBookings.find(x => x.id === id);
    await db.collection('bookings').doc(id).delete();
    if (booking && booking.slotId) {
      try { await db.collection('availableSlots').doc(booking.slotId).update({ booked: false, bookingId: null }); } catch (e) {}
    }
    allBookings = allBookings.filter(x => x.id !== id);
    renderBookings();
    await loadAllSlots();
    buildDayGrid();
    if (selectedDate) renderSlots(selectedDate);
  } catch (e) { console.error('Failed to delete:', e); alert('Failed to delete booking.'); }
}

function formatDate(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
</script>
